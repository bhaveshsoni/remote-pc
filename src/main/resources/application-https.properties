# HTTPS profile: required for voice mode (browsers only allow the microphone
# on secure origins). Run start-https.bat to generate the certificate and start.
#
# The keystore password is read from the ORBION_KEYSTORE_PASSWORD environment
# variable, falling back to a local-only default for the self-signed dev cert.
# Override it in any real deployment.
server.port=8443
server.ssl.key-store=file:orbion.p12
server.ssl.key-store-password=${ORBION_KEYSTORE_PASSWORD:orbion}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=orbion
